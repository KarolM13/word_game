<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Game - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <a href="/" style="text-decoration: none; color: inherit;"><h1>Word Game</h1></a>

        <div id="loginForm">
            <h2>Login</h2>
            <input type="text" id="loginNick" placeholder="Nick">
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="loginBtn">Login</button>
            <p id="loginError" class="error hidden"></p>
            <p>Don't have an account? <span id="showRegister" class="link">Register</span></p>
        </div>

        <div id="registerForm" class="hidden">
            <h2>Register</h2>
            <input type="text" id="registerNick" placeholder="Nick">
            <input type="password" id="registerPassword" placeholder="Password">
            <button id="registerBtn">Register</button>
            <p id="registerError" class="error hidden"></p>
            <p>Already have an account? <span id="showLogin" class="link">Login</span></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
